<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONSOONLIFT // EMERGENCY RADAR SYSTEM</title>
    <style>
        /* Retro Neon Accent Palette */
        :root {
            --bg-color: #0d0e12;          /* Deep mainframe cyber black */
            --text-color: #e0f2fe;        /* Crisp data readout white-blue */
            
            /* Requested Retro Accent Colors */
            --neon-red: #ff6b6b;          /* Light Red */
            --neon-orange: #ffb066;       /* Light Orange */
            --neon-blue: #7dd3fc;         /* Light Blue */
            
            --text-glow: rgba(125, 211, 252, 0.4);
            --panel-bg: #111319;
            --border-color: var(--neon-blue);
            --accent-dim: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 4px var(--text-glow);
            line-height: 1.5;
            padding: 15px;
        }

        /* CRT Scanline Filter Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
            z-index: 99999;
            background-size: 100% 3px;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid var(--border-color);
            background-color: var(--panel-bg);
            padding: 20px;
            box-shadow: 0 0 15px rgba(125, 211, 252, 0.15);
        }

        header {
            border: 1px dashed var(--neon-orange);
            padding: 10px;
            margin-bottom: 20px;
        }

        .banner-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--neon-orange);
        }

        /* Rigid Text-Based Command Menu */
        nav {
            display: flex;
            flex-wrap: wrap;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            padding: 10px;
            font-size: 0.85rem;
            border-right: 1px solid var(--border-color);
            flex-grow: 1;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        nav a:hover, nav a.active {
            background-color: var(--neon-blue);
            color: #000000;
            text-shadow: none;
            font-weight: bold;
        }

        nav a:last-child {
            border-right: none;
        }

        main {
            padding: 5px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        h1, h2, h3 {
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }

        h1 { 
            font-size: 2.2rem; 
            text-align: center; 
            letter-spacing: 3px; 
            color: var(--neon-red);
            text-shadow: 0 0 8px rgba(255, 107, 107, 0.6);
        }
        h2 { 
            font-size: 1.4rem; 
            padding-bottom: 4px; 
            margin-bottom: 20px; 
            color: var(--neon-orange); 
            text-shadow: 0 0 6px rgba(255, 176, 102, 0.5);
        }
        h3 { 
            font-size: 1.1rem; 
            margin-top: 25px; 
            color: var(--neon-blue); 
        }

        p {
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        /* Vintage Command Line Message Box */
        blockquote {
            border-left: 4px solid var(--neon-red);
            padding: 10px 0 10px 15px;
            margin: 20px 0;
            background: #181115;
        }

        ul {
            list-style: none;
            margin-bottom: 20px;
        }

        ul li {
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        ul li::before {
            content: "-> ";
            color: var(--neon-blue);
        }

        .danger-list li::before {
            content: "[!] ";
            color: var(--neon-red);
        }
        
        .danger-list span {
            color: var(--neon-orange);
        }

        /* ASCII Diagram Boxes */
        .diagram-box {
            border: 1px double var(--neon-orange);
            padding: 15px;
            text-align: left;
            white-space: pre-wrap;
            overflow-x: auto;
            margin: 20px 0;
            font-size: 0.85rem;
            background: #000;
            color: var(--neon-orange);
        }

        .image-container {
            border: 1px solid var(--border-color);
            padding: 10px;
            margin: 20px 0;
            text-align: center;
        }

        /* Dithered Matrix Filter to make modern pictures look like CRT graphics */
        .image-container img {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border-color);
            filter: grayscale(1) brightness(1.2) contrast(1.8);
            opacity: 0.65;
        }

        .image-caption {
            font-size: 0.8rem;
            margin-top: 8px;
            letter-spacing: 1px;
            color: var(--neon-blue);
        }

        /* Old-School Text Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #161e2e;
            color: var(--neon-blue);
        }

        /* Retro Terminal Blinking Animation */
        .blink {
            animation: terminal-blink 1s steps(2, start) infinite;
        }

        @keyframes terminal-blink {
            to { visibility: hidden; }
        }

        footer {
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
            text-align: center;
            font-size: 0.8rem;
            margin-top: 30px;
            color: var(--accent-dim);
        }

        @media (max-width: 600px) {
            nav a { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    
    <header>
        <div class="banner-text
